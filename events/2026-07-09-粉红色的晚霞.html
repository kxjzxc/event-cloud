<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <a href="../index.html" class="back-home">← 返回</a>
  
  <div class="event-page" data-event-id="2026-07-09-粉红色的晚霞">
    <header class="event-header">
      <div class="event-date">2026-07-09</div>
      <h1 class="event-title">粉红色的晚霞 — Event Cloud</h1>
    </header>
    
    <article class="event-content">
      <p>我和朋友吃完晚饭，走出商场的那一刻，粉红的晚霞映入眼帘，让我不由自主在河边驻足良久，用我不怎么样的手机相机尽力留住这一刻的惊艳。</p>
<p>听说清晨还有能将人从睡梦中惊醒的雷暴，和火红至极的朝霞，只可惜我睡得太死，无缘看见这奇异的风景。</p>
<img class="ec-img" src="../assets/thumbnails/2026-07-17-21-59-42.webp" data-preview="../assets/previews/2026-07-17-21-59-42.webp" alt="2026-07-17-21-59-42.jpeg" loading="lazy">
    </article>
    
    
    
    
    
    
  </div>
  
  <script src="../js/app.js"></script>
  <script>
    (function () {
      // Lightbox for inline images (ec-img class)
      var overlay = document.createElement('div');
      overlay.id = 'ec-lightbox';
      overlay.style.cssText = 'display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:9999;cursor:zoom-out;align-items:center;justify-content:center;';
      var lightboxImg = document.createElement('img');
      lightboxImg.style.cssText = 'max-width:92vw;max-height:92vh;border-radius:6px;box-shadow:0 4px 32px rgba(0,0,0,.6);';
      overlay.appendChild(lightboxImg);
      document.body.appendChild(overlay);

      function openLightbox(src) {
        lightboxImg.src = src;
        overlay.style.display = 'flex';
        document.body.style.overflow = 'hidden';
      }
      function closeLightbox() {
        overlay.style.display = 'none';
        document.body.style.overflow = '';
      }

      overlay.addEventListener('click', closeLightbox);
      document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') closeLightbox();
      });

      document.querySelectorAll('.ec-img').forEach(function(img) {
        img.style.cursor = 'zoom-in';
        img.addEventListener('click', function() {
          var preview = img.getAttribute('data-preview') || img.src;
          openLightbox(preview);
        });
      });
    })();
  </script>
</body>
</html>
