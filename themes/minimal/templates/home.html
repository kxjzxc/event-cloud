<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ title }}</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="event-data" style="display:none">{{ eventsJson }}</div>
  
  <div class="home">
    <div class="home-header">
      <h1 class="home-title">EVENT CLOUD</h1>
      <p class="home-subtitle">随机探索，遇见过去的自己</p>
      <div class="home-stats">
        共 <span id="total-events">0</span> 个事件 · 已解锁 <span id="unlocked-count">0</span> 个
      </div>
    </div>
    
    <button id="launch-btn" class="launch-btn">开启探索</button>
  </div>
  
  <div id="card-modal" class="card-modal">
    <div class="card">
      <div class="card-header">
        <div>
          <div id="card-date" class="card-date"></div>
          <h2 id="card-title" class="card-title"></h2>
        </div>
        <button id="card-close" class="card-close">×</button>
      </div>
      
      <div id="card-body" class="card-body">
        <div id="card-content" class="card-content"></div>
        <div id="card-media" class="card-media"></div>
        <div id="card-tags" class="card-tags"></div>
      </div>
      
      <div class="card-footer">
        <div class="card-actions">
          <button id="btn-random" class="action-btn random-btn">
            <span>→</span>
            <span>下一站</span>
          </button>
        </div>
      </div>
    </div>
  </div>
  
  <script src="js/app.js"></script>
</body>
</html>
