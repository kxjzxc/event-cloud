name: Deploy Event Cloud

on:
  push:
    branches:
      - main
      - master
  repository_dispatch:
    types:
      - graph-update

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
    steps:
      - name: Checkout Event Cloud
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Configure Git for Submodule Access
        run: |
          git config --global url."https://x-access-token:${{ secrets.EVENT_CLOUD_PAT }}@github.com/".insteadOf "https://github.com/"
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

      - name: Update Graph Submodule
        id: update-submodule
        run: |
          git submodule update --remote --merge
          git add graph
          if git diff --cached --quiet; then
            echo "::set-output name=has-changes::false"
            echo "No submodule changes to commit"
          else
            echo "::set-output name=has-changes::true"
            git commit -m "Update graph submodule from webhook"
            git push origin ${{ github.ref_name }}
          fi

      - name: Set up Node.js
        if: steps.update-submodule.outputs.has-changes == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        if: steps.update-submodule.outputs.has-changes == 'true'
        run: npm ci

      - name: Build Project
        if: steps.update-submodule.outputs.has-changes == 'true'
        run: npm run build

      - name: Generate Site
        if: steps.update-submodule.outputs.has-changes == 'true'
        run: npx evc generate

      - name: Deploy to GitHub Pages
        if: steps.update-submodule.outputs.has-changes == 'true'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.EVENT_CLOUD_PAT }}
          publish_dir: ./dist
          publish_branch: gh-pages
          commit_message: "Deploy Event Cloud - Graph updated"