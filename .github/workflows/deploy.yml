name: Deploy Event Cloud

on:
  push:
    branches:
      - main
      - master
  repository_dispatch:
    types:
      # evc deploy CLI
      - deploy
      # event-graph push webhook (legacy + current)
      - graph-update

permissions:
  contents: write
  pages: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Event Cloud
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.EVENT_CLOUD_PAT }}
          submodules: true
          fetch-depth: 0

      - name: Configure Git for Push
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

      - name: Update Graph Submodule
        run: |
          set -euo pipefail
          # Ensure submodule tracks event-graph main (required for --remote).
          git config -f .gitmodules submodule.graph.branch main
          git submodule sync --recursive

          # Explicitly fetch + checkout latest main. Relying only on
          # `submodule update --remote` is brittle when branch tracking
          # was never configured (historically caused "No submodule changes"
          # while event-graph had already advanced).
          git -C graph fetch origin main
          git -C graph checkout -B main origin/main

          echo "graph HEAD: $(git -C graph rev-parse --short HEAD)"
          echo "graph commit: $(git -C graph log -1 --oneline)"

          git add graph .gitmodules
          if git diff --cached --quiet; then
            echo "No submodule changes."
          else
            git commit -m "Update graph submodule"
            git push origin HEAD:main
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Project
        run: npm run build

      - name: Generate Site
        run: npx evc generate

      - name: Set deploy commit message
        id: deploy-msg
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "value=Deploy Event Cloud - Triggered by ${{ github.event.action }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=Deploy Event Cloud - Graph updated" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.EVENT_CLOUD_PAT }}
          publish_dir: ./dist
          publish_branch: gh-pages
          commit_message: ${{ steps.deploy-msg.outputs.value }}
